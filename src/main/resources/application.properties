spring.application.name=kirka
server.port=8080

# HBase Configuration
hbase.zookeeper.quorum=localhost
hbase.zookeeper.property.clientPort=2181

# HDFS Configuration
hadoop.hdfs.uri=hdfs://localhost:9000

# ===========================================
# Security Configuration
# ===========================================
# Enable/disable security (set to true to enable authentication and authorization)
security.enabled=false

# Authentication type: basic, knox, kerberos
security.authentication.type=basic

# Bcrypt htpasswd file (one user per line: "username:$2a$10$...").
# Required when security.enabled=true and Basic auth is used.
security.users.file=

# Trusted proxy CIDRs: X-Forwarded-User is honoured only when the request's remote address
# matches one of these entries. Leaving this blank effectively disables the Knox header
# (recommended when the pod is reachable directly from clients).
security.trusted.proxies=

# Admin users (comma-separated list). Only consulted after successful authentication to
# grant ROLE_ADMIN on top of ROLE_USER; it does not itself authenticate anyone.
security.admin.users=

# ===========================================
# Kerberos Configuration (when security.authentication.type=kerberos)
# ===========================================
security.kerberos.enabled=false
security.kerberos.principal=user@REALM.COM
security.kerberos.keytab=/path/to/user.keytab
security.kerberos.krb5conf=/etc/krb5.conf

# ===========================================
# Apache Ranger Configuration
# ===========================================
# Ranger service name (must match the service name in Ranger Admin)
ranger.service.name=kirka

# Ranger Admin URL
ranger.admin.url=http://localhost:6080

# Local policy cache directory
ranger.policy.cache.dir=/tmp/ranger-cache

# Enable owner-based authorization (owner always has full access to their resources)
security.authorization.owner.enabled=true

# ===========================================
# Logging
# ===========================================
logging.level.varga.kirka=INFO
logging.level.varga.kirka.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{request_id:-}] %-5level %logger{36} - %msg%n

# ===========================================
# Actuator & Metrics
# ===========================================
# Endpoints exposed publicly (health/info/prometheus); env/loggers/beans are admin-only
# and must be reached via /actuator/env etc. with ROLE_ADMIN (cf. SecurityConfig).
management.endpoints.web.exposure.include=health,info,prometheus,env,loggers,beans
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# Base path for actuator endpoints
management.endpoints.web.base-path=/actuator

# Application info (env/java/os are readable only through the authz-protected /actuator/info)
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# ===========================================
# Graceful shutdown
# ===========================================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ===========================================
# Multipart (artifact uploads)
# ===========================================
spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB

# ===========================================
# API JSON naming (MLFlow compatibility)
# ===========================================
# Official MLFlow clients expect snake_case on the wire; the legacy default here is camel_case
# while the controller test suite is being migrated. Production deployments should set this to
# snake_case to interoperate with the standard mlflow Python/Java/R clients.
kirka.api.naming=camel_case

info.app.name=Kirka
info.app.description=MLFlow compatible service for Hadoop
info.app.version=0.0.1-SNAPSHOT

# Prometheus configuration
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# Health indicators
management.health.diskspace.enabled=true
management.health.ping.enabled=true
